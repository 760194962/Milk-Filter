name: Build release binaries

# Builds standalone executables for Windows, macOS and Linux with PyInstaller
# and attaches them to the matching GitHub release.
#
# - Pushing a tag like `v1.2.0` builds and uploads to that release automatically.
# - You can also run it manually (workflow_dispatch) against an existing tag,
#   e.g. to back-fill binaries for v1.1.0.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and upload binaries for'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: MilkFilter-windows-x64.exe
          - os: macos-latest
            asset: MilkFilter-macos-arm64.zip
          - os: ubuntu-latest
            asset: MilkFilter-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy opencv-python-headless pyinstaller

      # icon.ico is bundled as data so the in-app window icon (loaded via PIL)
      # works on every platform. The native exe icon is only set on Windows,
      # since macOS needs .icns and Linux doesn't use it here.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --onefile --windowed --name MilkFilter
          --icon icon.ico
          --add-data "icon.ico;."
          filter.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --onefile --windowed --name MilkFilter
          --add-data "icon.ico:."
          filter.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile --windowed --name MilkFilter
          --add-data "icon.ico:."
          filter.py

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/MilkFilter.exe "out/${{ matrix.asset }}"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # --windowed yields MilkFilter.app; zip it to preserve the bundle
            cd dist && zip -r -q "../out/${{ matrix.asset }}" MilkFilter.app && cd ..
          else
            mv dist/MilkFilter "out/${{ matrix.asset }}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
